name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: native }
          - { os: macos-latest, target: native }
          - { os: windows-latest, target: native }
          - { os: ubuntu-latest, target: js }
          - { os: ubuntu-latest, target: wasm-gc }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Disable auto CRLF
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - uses: actions/checkout@v6

      - name: Install MoonBit (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install MoonBit (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$env:USERPROFILE\.moon\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Install dependencies
        run: moon update

      - name: Check
        run: moon check --target ${{ matrix.target }}

      - name: Test
        run: moon test --target ${{ matrix.target }}
      
      - name: Parity Tests
        if: ${{ runner.os == 'Linux' && matrix.target == 'native' }}
        run: make parity

      - name: Roundtrip Tests
        run: moon test --target ${{ matrix.target }} --filter "*round*trip*"

